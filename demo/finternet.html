// ── Language ─────────────────────────────────────────────
const LMAP = { EN:'en', HI:'hi', KN:'kn', TA:'ta' };
function lang() { return LMAP[S.config.primary_language] || 'hi'; }
function setTtsLang(l, el) {
  S.ttsLang = l;
  const RMAP = { hi:'HI', en:'EN', kn:'KN', ta:'TA' };
  S.config.primary_language = RMAP[l] || 'HI';
  document.querySelectorAll('.lbtn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  stopAudio();
  if (S.screen === 'step') {
    delete S.stepCache[S.step];
    renderStep(S.step);
  } else if (S.screen === 'tx_detail') {
    generateAndSetKLH(buildTxScreenContent());
  } else if (S.screen === 'dashboard') {
    generateAndSetKLH(buildDashboardContent());
  }
}

// ── Navigation ───────────────────────────────────────────
function setTopbar(title, badge, showBack, showDots) {
  document.getElementById('topbar-title').textContent = title;
  document.getElementById('topbar-right').textContent = badge || '';
  document.getElementById('back-btn').style.visibility = showBack ? 'visible' : 'hidden';
  document.getElementById('step-bar').style.display = showDots ? 'flex' : 'none';
}

function goBack() {
  stopAudio();
  if (S.screen === 'tx_detail') showDashboard();
  else if (S.screen === 'step') { S.step > 0 ? showStep(S.step - 1) : showDashboard(); }
  else showDashboard();
}

function showDashboard() {
  S.screen = 'dashboard';
  setTopbar('Finternet', '', false, false);
  renderDashboard();
}

function openTx(i) {
  S.screen = 'tx_detail';
  S.txIndex = i;
  S.txView = 'user';
  const tx = persona().txs[i];
  setTopbar(tx.title, tx.status === 'SUCCESS' ? '✅' : '❌', true, false);
  renderTxDetail();
}

function switchView(v) { stopAudio(); S.txView = v; renderTxDetail(); }

function showStep(n) {
  S.screen = 'step';
  S.step = n;
  const st = steps()[n];
  setTopbar(st.title, `${n+1}/5`, true, true);
  for (let i = 0; i < 5; i++) {
    document.getElementById('sd'+i).className = 'sdot' + (i < n ? ' done' : i === n ? ' active' : '');
  }
  renderStep(n);
}

function showComplete() {
  S.screen = 'complete';
  setTopbar('Completed!', '🎉', false, false);
  renderComplete();
}

// ── Input Helpers ─────────────────────────────────────────
function showPhotoPreview(input) {
  if (input.files && input.files[0]) {
    const reader = new FileReader();
    reader.onload = e => {
      const img = document.getElementById('photo-preview');
      const zone = document.getElementById('photo-zone');
      img.src = e.target.result;
      img.style.display = 'block';
      zone.style.display = 'none';
    };
    reader.readAsDataURL(input.files[0]);
  }
}

function fmtAadhaar(inp) {
  let v = inp.value.replace(/\D/g, '').substr(0, 12);
  let out = '';
  for (let i = 0; i < v.length; i++) {
    if (i === 4 || i === 8) out += ' ';
    out += v[i];
  }
  inp.value = out;
}

function sendOTP() {
  const a = document.getElementById('inp-aadhaar');
  if (!a || a.value.replace(/\s/g,'').length !== 12) {
    alert(isSimple() ? 'Pehle 12 ank ka Aadhar number daalo' : 'Please enter a valid 12-digit Aadhaar number');
    return;
  }
  const btn = document.getElementById('otp-send-btn');
  btn.textContent = isSimple() ? '✅ OTP bheja gaya! Phone dekho.' : '✅ OTP sent to registered mobile';
  btn.classList.add('otp-sent');
  btn.disabled = true;
  setTimeout(() => {
    btn.textContent = isSimple() ? '📱 OTP dobara bhejo' : '📱 Resend OTP';
    btn.classList.remove('otp-sent');
    btn.disabled = false;
  }, 30000);
}

function setSettleOpt(opt) {
  document.getElementById('opt-upi').classList.toggle('active', opt === 'upi');
  document.getElementById('opt-bank').classList.toggle('active', opt === 'bank');
  document.getElementById('settle-upi-wrap').style.display = opt === 'upi' ? 'block' : 'none';
  document.getElementById('settle-bank-wrap').style.display = opt === 'bank' ? 'block' : 'none';
}

function validateAndNext(n) {
  const simple = isSimple();
  if (n === 1) {
    const otp = document.getElementById('inp-otp');
    if (otp && otp.value.replace(/\D/g,'').length < 6) {
      alert(simple ? '6 ank ka OTP daalo' : 'Please enter the 6-digit OTP');
      otp.focus();
      return;
    }
    const consent = document.getElementById('inp-consent');
    if (consent && !consent.checked) {
      alert(simple ? 'Neeche wale box mein tick karo — ijazat zaroori hai' : 'Please provide Account Aggregator consent to proceed');
      return;
    }
  }
  if (n === 2) {
    const terms = document.getElementById('inp-terms');
    if (terms && !terms.checked) {
      alert(simple ? 'Pehle box mein tick karo — samjha toh?' : 'Please accept the collateral terms to proceed');
      return;
    }
  }
  if (n === 3) {
    const klh = document.getElementById('inp-klh');
    if (klh && !klh.checked) {
      alert(simple ? 'Pehle suno, phir tick karo' : 'Please confirm that you have listened and understood');
      return;
    }
  }
  showStep(n + 1);
}

// ── Render: Step ─────────────────────────────────────────
async function renderStep(n) {
  const st = steps()[n];
  const content = document.getElementById('content');

  if (S.stepCache[n]) { renderStepContent(n, S.stepCache[n]); return; }

  content.innerHTML = `
    <div class="card c-tx">
      <div class="sk" style="height:12px;width:40%;margin-bottom:10px"></div>
      <div class="sk" style="height:18px;width:75%;margin-bottom:10px"></div>
      <div class="sk" style="height:13px;width:100%;margin-bottom:5px"></div>
      <div class="sk" style="height:13px;width:85%;margin-bottom:5px"></div>
      <div class="sk" style="height:13px;width:65%"></div>
    </div>
    <div style="text-align:center;color:#999;font-size:12px;margin-top:12px">✨ DPIx samajh raha hai...</div>`;

  try {
    const r = await fetch('/api/rhetorical', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ step: st.obj, context: { language: lang(), userProfile: persona().profile, materiality: st.mat, appName: 'Finternet Asset Tokenization — DPIx Demo' } })
    });
    if (!r.ok) throw new Error('Server ' + r.status);
    const data = await r.json();
    S.stepCache[n] = data;
    renderStepContent(n, data);
  } catch (e) {
    content.innerHTML = `
      <div class="risk-box"><div>❌</div><div class="risk-text">Claude se error: ${e.message}</div></div>
      <div class="card c-tx"><div class="card-headline">${st.title}</div><div class="card-body">${st.obj.description}</div></div>
      <button class="btn btn-primary" onclick="renderStep(${n})">Dobara Try Karo</button>`;
  }
}

function renderStepContent(n, d) {
  const st = steps()[n];
  const bc = { INFORMATIONAL:'c-info', NAVIGATIONAL:'c-nav', TRANSACTIONAL:'c-tx', CONSEQUENTIAL:'c-con' }[st.mat];
  const isKLH = st.id === 'klh';
  const isLast = n === 4;

  // Build rich screen content for deep KLH
  const _a = persona().asset;
  const _screenContent = [
    `Step ${n+1}: ${st.title} (${st.mat})`,
    `Headline: ${d.headline}`,
    `Explanation: ${d.plain_explanation}`,
    d.risk_signal ? `Risk warning: ${d.risk_signal}` : '',
    d.what_happens_next ? `What happens next: ${d.what_happens_next}` : '',
    d.help_nudge ? `Tip for user: ${d.help_nudge}` : '',
    st.id==='contract' ? `Smart contract: asset ${_a.name} valued ${_a.value} locked as collateral. Liquidation if delay exceeds 90 days. Penalty rate 18.5% per year. This is legally binding.` : '',
    st.id==='klh' ? 'This is the critical comprehension checkpoint. Explain every risk and consequence fully.' : '',
    st.id==='settle' ? `Atomic swap: loan amount ${_a.value} credited to account simultaneously as ${_a.name} is locked. Both happen together or neither happens.` : ''
  ].filter(Boolean).join(' | ');
  generateAndSetKLH(_screenContent);
  if (isKLH) {
    document.getElementById('bsheet').classList.add('open');
    document.getElementById('fab').style.display = 'flex';
  }

  let extra = '';
  if (st.id === 'contract' && st.obj.terms) {
    const t = st.obj.terms;
    const cid = '0x' + Math.random().toString(16).substr(2,8).toUpperCase();
    extra = `<div class="contract-block">
<span>SMART_CONTRACT_ID:</span> ${cid}...<br>
<span>CONDITION:</span> ${t.condition}<br>
<span>TRIGGER:</span> ${t.trigger}<br>
<span>ACTION:</span> ${t.action}<br>
<span>PENALTY_APR:</span> ${t.penalty}
</div>`;
  }

  const nextAction = isLast ? 'showComplete()' : `validateAndNext(${n})`;
  const btnLabel = isLast
    ? '✅ ' + (d.confidence_phrase || 'Transaction Poori Karo')
    : '→ ' + (isSimple() ? 'Aage Badhein' : 'Continue');

  document.getElementById('content').innerHTML = `
    <div class="card ${bc}">
      <div class="card-step-tag">${st.icon} Step ${n+1} · ${st.mat}</div>
      <div class="card-headline">${d.headline}</div>
      <div class="card-body">${d.plain_explanation}</div>
    </div>
    ${extra}
    ${d.risk_signal ? `<div class="risk-box"><div>⚠️</div><div class="risk-text">${d.risk_signal}</div></div>` : ''}
    ${d.what_happens_next ? `<div class="next-box"><div class="next-label">Aage Kya Hoga</div><div class="next-text">${d.what_happens_next}</div></div>` : ''}
    ${d.help_nudge ? `<div class="nudge-box"><div>💡</div><div class="nudge-text">${d.help_nudge}</div></div>` : ''}
    ${stepInputsHtml(n)}
    ${isKLH ? `<button class="btn btn-warn" onclick="toggleSheet(); setTimeout(togglePlay,300)">🔊 Kya Likha Hai — Abhi Suniye</button>` : ''}
    <button class="btn ${isLast?'btn-success':'btn-primary'}" onclick="${nextAction}">
      ${btnLabel}
    </button>
    <div style="height:6px"></div>`;
}

// ── Render: Complete ─────────────────────────────────────

    </div>

    <button class="btn btn-ghost" onclick="showDashboard()">← Dashboard</button>`;

// ── KLH / TTS ────────────────────────────────────────────
async function generateAndSetKLH(screenContent) {
  stopAudio();
  const klhEl = document.getElementById('klh-txt');
  const genEl = document.getElementById('klh-generating');
  const playBtn = document.getElementById('play-btn');
  if (!klhEl) return;
  klhEl.textContent = '';
  if (genEl) genEl.style.display = 'block';
  if (playBtn) { playBtn.disabled = true; playBtn.className = 'play-btn'; }

  try {
    const r = await fetch('/api/klh-script', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        screen_content: screenContent,
        persona_profile: persona().profile,
        language: ({'hi':'Hindi — USE DEVANAGARI SCRIPT ONLY, never Roman/Latin','en':'English','kn':'Kannada — USE KANNADA SCRIPT ONLY','ta':'Tamil — USE TAMIL SCRIPT ONLY'})[lang()]||'Hindi — USE DEVANAGARI SCRIPT ONLY',
        verbosity: S.config.klh_verbosity || 'MEDIUM'
      })
    });
    if (!r.ok) throw new Error('KLH ' + r.status);
    const data = await r.json();
    S.klhScript = data.script || screenContent;
  } catch(e) {
    // Fallback gracefully — use screen content directly
    S.klhScript = screenContent;
  } finally {
    if (genEl) genEl.style.display = 'none';
    if (klhEl) klhEl.textContent = S.klhScript;
    if (playBtn) playBtn.disabled = false;
  }
}

function setKLH(text) {
  S.klhScript = text;
  document.getElementById('klh-txt').textContent = text;
}

function toggleSheet() {
  const sheet = document.getElementById('bsheet');
  sheet.classList.toggle('open');
  // FAB always visible
  document.getElementById('fab').style.display = 'flex';
}

function closeSheet() {
  stopAudio();
  document.getElementById('bsheet').classList.remove('open');
  document.getElementById('fab').style.display = 'flex';
}

function chunkText(text, max = 200) {
  const parts = text.match(/[^।\.!\?]+[।\.!\?]*/g) || [text];
  const out = [];
  let cur = '';
  for (const s of parts) {
    if (cur.length + s.length > max && cur) { out.push(cur.trim()); cur = s; }
    else cur += ' ' + s;
  }
  if (cur.trim()) out.push(cur.trim());
  return out.filter(c => c.length > 0);
}

let _actx = null;
function getActx() {
  if (!_actx) _actx = new (window.AudioContext || window.webkitAudioContext)();
  return _actx;
}

// 7 valid Sarvam speakers
const SPEAKERS = ['anushka','abhilash','manisha','vidya','arya','karun','hitesh'];

// ── Audio ─────────────────────────────────────────────────
function stopAudio() {
  if (S.currentSrc) { try { S.currentSrc.stop(); } catch(e) {} S.currentSrc = null; }
  S.playing = false;
  setPlayBtn('idle');
  const fab = document.getElementById('fab');
  if (fab) fab.classList.remove('live');
}

function setPlayBtn(state) {
  const btn = document.getElementById('play-btn');
  const ico = document.getElementById('play-ico');
  const lbl = document.getElementById('play-lbl');
  if (!btn) return;
  btn.className = 'play-btn';
  if (state === 'playing') {
    btn.classList.add('playing'); ico.textContent = '⏸'; lbl.textContent = 'Rok do / Stop';
  } else if (state === 'loading') {
    ico.textContent = '⏳'; lbl.textContent = 'Load ho raha hai...'; btn.disabled = true;
  } else {
    ico.textContent = '🔊'; lbl.textContent = 'Suniye / Listen'; btn.disabled = false;
  }
}

async function togglePlay() {
  if (S.playing) { stopAudio(); return; }
  await startPlayback();
}

async function startPlayback() {
  if (!S.klhScript) return;
  getActx().resume();
  S.playing = true;
  setPlayBtn('loading');
  document.getElementById('fab').classList.add('live');

  // Lock ONE speaker for the entire KLH session
  const speaker = SPEAKERS[Math.floor(Math.random() * SPEAKERS.length)];
  const chunks = chunkText(S.klhScript);

  // Lookahead cache: chunk index -> Promise<AudioBuffer>
  const cache = new Map();

  function prefetch(i) {
    if (i >= chunks.length || cache.has(i) || !S.playing) return;
    cache.set(i, fetchAndDecode(chunks[i], speaker));
  }

  // Immediately prefetch first two chunks
  prefetch(0);
  prefetch(1);

  try {
    for (let i = 0; i < chunks.length; i++) {
      if (!S.playing) break;
      const lbl = document.getElementById('play-lbl');
      if (lbl) lbl.textContent = `${i+1}/${chunks.length} bol raha hai...`;
      const btn = document.getElementById('play-btn');
      if (btn) { btn.disabled = false; btn.className = 'play-btn playing'; }
      const ico = document.getElementById('play-ico');
      if (ico) ico.textContent = '⏸';

      // Prefetch chunk i+2 while i is decoding
      prefetch(i + 2);

      const buf = await cache.get(i);
      if (!S.playing) break;

      // Play and prefetch next while playing
      await new Promise((res) => {
        const ctx = getActx();
        const src = ctx.createBufferSource();
        src.buffer = buf;
        src.connect(ctx.destination);
        src.onended = () => { S.currentSrc = null; res(); };
        S.currentSrc = src;
        prefetch(i + 2); // belt and suspenders
        src.start(0);
      });

      cache.delete(i);
    }
  } catch(e) {
    const el = document.getElementById('klh-txt');
    if (el) el.textContent += ' [Error: ' + e.message + ']';
  } finally {
    S.playing = false;
    S.currentSrc = null;
    document.getElementById('fab').classList.remove('live');
    setPlayBtn('idle');
  }
}

async function fetchAndDecode(text, speaker) {
  const langMap = {hi:'hi-IN',en:'en-IN',kn:'kn-IN',ta:'ta-IN'};
  const r = await fetch('/api/tts', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ text, language: langMap[S.ttsLang]||'hi-IN', speaker })
  });
  if (!r.ok) throw new Error('TTS ' + r.status);
  const data = await r.json();
  if (!data.data_uri) throw new Error('No audio');
  const ctx = getActx();
  await ctx.resume();
  const b64 = data.data_uri.split(',')[1];
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return ctx.decodeAudioData(bytes.buffer);
}


// ── Config ───────────────────────────────────────────────
function applyConfig(cfg) {
  const prevPersona = S.config.persona_name;
  S.config = { ...S.config, ...cfg };
  S.ttsLang = LMAP[cfg.primary_language] || 'hi';
  if (cfg.klh_verbosity) S.config.klh_verbosity = cfg.klh_verbosity;
  document.querySelectorAll('.lbtn').forEach(b => b.classList.toggle('active', b.dataset.l === S.ttsLang));
  document.getElementById('cfg-badge').textContent = `⚙ ${cfg.persona_name||'DEFAULT'} · ${cfg.primary_language||'HI'} · 🔗 API`;
  document.getElementById('cfg-strip-text').textContent = `${cfg.persona_name||'DEMO'} · ${cfg.primary_language||'HI'} · API OK`;
  if (prevPersona !== cfg.persona_name) {
    stopAudio();
    S.stepCache = {};
    if (S.screen === 'step' || S.screen === 'complete') showDashboard();
    else if (S.screen === 'dashboard') renderDashboard();
    else if (S.screen === 'tx_detail') renderTxDetail();
  }
}

// ── Init ─────────────────────────────────────────────────
async function init() {
  try {
    const { data, error } = await db.from('configurations').select('*').eq('id','active').single();
    if (error) throw error;
    if (data) applyConfig(data);
    document.getElementById('cfg-dot').classList.add('on');
    document.getElementById('cfg-strip-text').textContent = (data?.persona_name||'DEMO') + ' · connected';
    db.channel('finternet')
      .on('postgres_changes', { event:'UPDATE', schema:'public', table:'configurations' },
        p => { applyConfig(p.new); })
      .subscribe();
  } catch(e) {
    document.getElementById('cfg-dot').style.background = '#ef4444';
    document.getElementById('cfg-strip-text').textContent = 'Config error: ' + e.message;
  }
  showDashboard();
}

init();
</script>
