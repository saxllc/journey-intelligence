// ── Scorer ────────────────────────────────────────────────
function score(text){
  let tokens=text.toLowerCase().split(/[\s,.\-;:()]+/).filter(Boolean);
  let found=[];let seen=new Set();
  for(let i=0;i<tokens.length;i++){
    for(let w=3;w>=1;w--){
      let phrase=tokens.slice(i,i+w).join(' ');
      for(let[term,d]of Object.entries(DPL)){
        if(seen.has(term))continue;
        let aliases=d.aliases||[];
        if(phrase===term||aliases.some(a=>phrase===a.toLowerCase())){
          found.push({term,display:phrase,cat:d.cat,mat:d.mat,fraud:d.fraud});
          seen.add(term);
        }
      }
    }
  }
  let wt=found.reduce((s,t)=>s+t.mat*(1+FRAUD_W[t.fraud]),0);
  let density=wt/Math.max(tokens.length,5);
  let maxMat=found.length?Math.max(...found.map(t=>t.mat)):1;
  return{found,density:Math.min(density,1),materiality:maxMat,wordCount:tokens.length};
}

function highlight(text,terms){
  let out=text;
  let sorted=[...terms].sort((a,b)=>b.display.length-a.display.length);
  sorted.forEach(t=>{
    let re=new RegExp('('+t.display.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
    out=out.replace(re,`<span class="dpl l${t.mat}" title="${t.term} | ${t.cat} | L${t.mat} | ${t.fraud}">$1</span>`);
  });
  return out;
}

// ── State ─────────────────────────────────────────────────
let S={j:0,action:null,persona:0,verb:1,playing:false,speaker:null,audioCtx:null,currentSource:null};

// ── Audio ─────────────────────────────────────────────────
function pickSpeaker(){
  if(!S.speaker)S.speaker=SPEAKERS[Math.floor(Math.random()*SPEAKERS.length)];
  return S.speaker;
}

async function playTTS(text,lang){
  if(!ngrokUrl){alert('Set ngrok URL in configurator first.');return;}
  if(S.playing){stopAudio();return;}
  S.playing=true;
  updatePlayBtn();
  try{
    if(!S.audioCtx)S.audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    await S.audioCtx.resume();
    const langMap={Hindi:'hi-IN',Hinglish:'hi-IN','Colloquial Hindi':'hi-IN'};
    const sarvamLang=langMap[lang]||'hi-IN';
    const res=await fetch(ngrokUrl+'/api/tts',{
      method:'POST',
      headers:{'Content-Type':'application/json','ngrok-skip-browser-warning':'true'},
      body:JSON.stringify({text,language:sarvamLang.split('-')[0],speaker:pickSpeaker()})
    });
    const data=await res.json();
    if(!data.data_uri)throw new Error('No audio returned');
    const audioRes=await fetch(data.data_uri);
    const buf=await audioRes.arrayBuffer();
    const decoded=await S.audioCtx.decodeAudioData(buf);
    S.currentSource=S.audioCtx.createBufferSource();
    S.currentSource.buffer=decoded;
    S.currentSource.connect(S.audioCtx.destination);
    S.currentSource.onended=()=>{S.playing=false;S.currentSource=null;updatePlayBtn();};
    S.currentSource.start();
  }catch(e){
    console.error('TTS error:',e);
    S.playing=false;
    updatePlayBtn();
  }
}

function stopAudio(){
  if(S.currentSource){try{S.currentSource.stop();}catch(e){}}
  S.playing=false;S.currentSource=null;
  updatePlayBtn();
}

function updatePlayBtn(){
  const btn=document.getElementById('play-btn');
  if(!btn)return;
  btn.textContent=S.playing?'⏸ Playing... tap to stop':'▶ Play narration via Sarvam';
  btn.classList.toggle('playing',S.playing);
}

  <div class="jsel">${J.map((x,i)=>`<button class="jbtn${i===S.j?' on':''} l${x.mat}" onclick="selJ(${i})">${x.name}</button>`).join('')}</div>
  <div class="screen-box">${highlight(j.screen,s.found)}</div>
  <div class="stats">
    <div class="st"><div class="st-l">density</div><div class="st-v">${s.density.toFixed(2)}</div></div>
    <div class="st"><div class="st-l">materiality</div><div class="st-v l${s.materiality}">L${s.materiality}</div></div>
    <div class="st"><div class="st-l">DPL terms</div><div class="st-v">${s.found.length}</div></div>
    <div class="st"><div class="st-l">narrate?</div><div class="st-v">${s.density>=0.15?'<span style="color:#0f6e56">YES</span>':'<span style="color:#888">NO</span>'}</div></div>
  </div>
  <div style="font-size:11px;color:#888;margin-bottom:6px">latent state vector (detected terms)</div>
  <div class="terms-list">${s.found.map(t=>`<span class="term-chip">${t.term}<span class="term-cat">${t.cat}</span> <span style="font-size:10px;color:#888">L${t.mat}</span></span>`).join('')}</div>`;
}

  <div class="jsel">${J.map((x,i)=>`<button class="jbtn${i===S.j?' on':''} l${x.mat}" onclick="selJ(${i})">${x.name}</button>`).join('')}</div>

  <div style="font-size:13px;font-weight:600;margin-bottom:8px">actions available from this state</div>
  <div class="act-grid">${j.actions.map((a,i)=>`<div class="act-card${S.action===i?' sel':''}" onclick="selA(${i})">

  <div class="next-state"><strong>next state:</strong> ${j.actions[S.action].next}</div></div>
  `:'<div style="font-size:12px;color:#888;padding:16px;text-align:center;background:#fff;border-radius:12px;border:1px solid #e5e7eb">tap an action to see its consequence prediction and next state</div>'}`;

function renderDecoder(){
  let j=J[S.j],pid=PERSONAS[S.persona].id,vl=VERBS[S.verb];
  let narr=N[j.id]&&N[j.id][pid]?N[j.id][pid][vl]:null;
  document.getElementById('p2').innerHTML=`
  <div class="arch-bar"><div class="arch-icon">g</div><div><div class="arch-label">decoder g(s) — Sarvam narration</div><div class="arch-desc">Consequence prediction → narration in user's language, register, and verbosity. Sarvam Bulbul v2 converts to speech. Same consequence, different words per persona.</div></div></div>
  <div class="jsel">${J.map((x,i)=>`<button class="jbtn${i===S.j?' on':''} l${x.mat}" onclick="selJ(${i})">${x.name}</button>`).join('')}</div>
  <div style="font-size:12px;font-weight:600;margin-bottom:6px">persona</div>
  <div class="persona-row">${PERSONAS.map((p,i)=>`<button class="pbtn${i===S.persona?' on':''}" onclick="selP(${i})">${p.name}</button>`).join('')}</div>
  <div style="font-size:12px;font-weight:600;margin-bottom:6px">verbosity</div>
  <div class="verb-row">${VERBS.map((v,i)=>`<button class="vbtn${i===S.verb?' on':''}" onclick="selV(${i})">${v}</button>`).join('')}</div>
  ${narr?`
  <div class="narr-box"><div class="narr-text">${narr}</div></div>
  <div class="narr-meta">~${narr.split(/\s+/).length} words · ${PERSONAS[S.persona].lang} · ${PERSONAS[S.persona].profile} · Sarvam Bulbul v2 @ 0.85x for L4</div>
  <button class="play-btn" id="play-btn" onclick="playTTS(\`${narr.replace(/`/g,"'")}\`,'${PERSONAS[S.persona].lang}')">▶ Play narration via Sarvam</button>
  `:`<div style="padding:16px;background:#fff;border-radius:12px;border:1px solid #e5e7eb;font-size:12px;color:#888;text-align:center;line-height:1.6">
  Narration templates available for: <strong>collect request</strong>, <strong>NACH mandate</strong>, <strong>eKYC</strong>, <strong>credit line</strong>.<br>Select one of those journeys to see persona-adapted decoder output with live Sarvam audio.</div>`}`;
}

function renderHeatmap(){
  let rows=J.map(j=>{let s=score(j.screen);return{name:j.name,id:j.id,density:s.density,mat:s.materiality,terms:s.found.length,idx:J.indexOf(j)};}).sort((a,b)=>b.density-a.density);
  let maxD=Math.max(...rows.map(r=>r.density));
  let colors={1:'#97c459',2:'#378add',3:'#ef9f27',4:'#e24b4a'};
  document.getElementById('p3').innerHTML=`
  <div class="arch-bar"><div class="arch-icon">Σ</div><div><div class="arch-label">journey matrix — billion users, million journeys</div><div class="arch-desc">DPL density across 13 UPI journey types. Higher density = more consequence terms on screen = larger comprehension gap. At 14B txns/month, ~15-20% are L3+L4 = 2-3B Sarvam API calls/month.</div></div></div>
  <div class="hm-row hm-header"><div>journey</div><div>level</div><div>DPL density</div><div>terms</div></div>
  ${rows.map((r,i)=>{
    let aboveThreshold=r.density>=0.15;
    return`<div class="hm-row" style="${aboveThreshold?'':'opacity:.5'}">
    <a class="hm-name" onclick="selJ(${r.idx});showTab(0)">${r.name}</a>
    <div><span style="font-weight:600;color:${colors[r.mat]}">L${r.mat}</span></div>
    <div style="display:flex;align-items:center;gap:6px"><div class="hm-bar" style="width:${(r.density/maxD*100).toFixed(0)}%;background:${colors[r.mat]}"></div><span style="font-size:11px">${r.density.toFixed(2)}</span></div>
    <div style="text-align:center">${r.terms}</div>
  </div>`+(i===rows.filter(x=>x.density>=0.15).length-1?'<div style="border-top:2px dashed #e24b4a;margin:4px 0;position:relative"><span style="position:absolute;right:0;top:-14px;font-size:9px;color:#e24b4a">narration trigger threshold (0.15)</span></div>':'');
  }).join('')}
  <div style="margin-top:16px;padding:12px;background:#fff;border-radius:10px;border:1px solid #e5e7eb;font-size:12px;line-height:1.6;color:#555">
  <strong>For Sarvam:</strong> Every journey above the threshold line = 1 Bulbul TTS call + 1 Sarvam-30B inference call per transaction. At UPI scale (14B txns/month), with ~18% L3+L4 trigger rate, that's ~2.5B API calls/month. No single customer can offer Sarvam this volume.
  </div>`;
}

function showTab(n){
  stopAudio();
  document.querySelectorAll('.tab').forEach((t,i)=>{t.classList.toggle('on',i===n)});
  document.querySelectorAll('.panel').forEach((p,i)=>{p.classList.toggle('on',i===n)});
  [renderEncoder,renderPredictor,renderDecoder,renderHeatmap][n]();
}
function selJ(i){S.j=i;S.action=null;S.speaker=null;let active=[...document.querySelectorAll('.tab')].findIndex(t=>t.classList.contains('on'));showTab(active);}
function selA(i){S.action=i;renderPredictor();}
function selP(i){S.persona=i;S.speaker=null;renderDecoder();}
function selV(i){S.verb=i;renderDecoder();}
</script>
