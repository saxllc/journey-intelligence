.back-btn{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;padding:2px 6px;line-height:1;border-radius:6px;transition:background .15s}
.back-btn:active{background:rgba(255,255,255,.2)}
.topbar-title{font-size:15px;font-weight:600;flex:1;letter-spacing:.2px}
.topbar-right{font-size:13px;opacity:.8}
.step-bar{display:flex;gap:5px;padding:10px 16px 8px;background:#fff;flex-shrink:0;border-bottom:1px solid #eee}
.sdot{height:3px;border-radius:2px;flex:1;background:#e0e0e0;transition:all .3s}
.sdot.done{background:#1a237e}
.sdot.active{background:#ff8f00}
.content{flex:1;overflow-y:auto;padding:14px;padding-bottom:100px;scroll-behavior:smooth}

.hero::before{content:'';position:absolute;top:-20px;right:-20px;width:120px;height:120px;background:rgba(255,255,255,.05);border-radius:50%}
.hero-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.hero-name{font-size:19px;font-weight:700}
.hero-loc{font-size:11px;opacity:.65;margin-top:2px}
.pill{font-size:10px;font-weight:700;padding:3px 10px;border-radius:8px}
.hero-asset{background:rgba(255,255,255,.13);border-radius:14px;padding:12px;display:flex;align-items:center;gap:12px}
.asset-emoji{font-size:30px}
.asset-label{font-size:9px;opacity:.6;text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}
.asset-name{font-size:13px;font-weight:600}
.asset-val{font-size:12px;opacity:.75;margin-top:2px}
.hero-goal{font-size:11px;opacity:.55;margin-top:10px}
.sec-label{font-size:10px;font-weight:700;color:#999;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;margin-top:4px}
.tx-card{background:#fff;border-radius:14px;padding:13px 14px;margin-bottom:9px;display:flex;align-items:center;gap:11px;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,.05);transition:transform .15s,box-shadow .15s;border:1px solid transparent}
.tx-card:active{transform:scale(.97);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.tx-card:hover{border-color:#e8eaff}
.tx-ico{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.tx-ico.ok{background:#e8f5e9}
.tx-ico.fail{background:#ffebee}
.tx-info{flex:1;min-width:0}
.tx-title{font-size:13px;font-weight:600;color:#212121;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-sub{font-size:10px;color:#aaa}
.tx-arr{color:#ccc;font-size:20px;flex-shrink:0}

.c-info{border-left:4px solid #0288d1}
.c-nav{border-left:4px solid #388e3c}
.c-tx{border-left:4px solid #f57c00}
.c-con{border-left:4px solid #c62828}
.card-step-tag{font-size:10px;font-weight:700;color:#aaa;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}

.nudge-text{font-size:12px;color:#1565c0;line-height:1.6}
.contract-block{background:#0d1117;border-radius:12px;padding:14px;font-family:'Courier New',monospace;font-size:10px;color:#58a6ff;line-height:1.9;margin-bottom:10px;overflow-x:hidden}

.sk{background:linear-gradient(90deg,#ececec 25%,#ddd 50%,#ececec 75%);background-size:200% 100%;animation:sh 1.5s infinite;border-radius:6px;display:block}

.btn-success{background:#2e7d32;color:#fff}
.btn-danger{background:#c62828;color:#fff}

.lbtn.active{background:#1a237e;border-color:#1a237e;color:#fff;font-weight:600}
.klh-txt{font-size:13px;line-height:1.75;color:#333;min-height:50px;margin-bottom:12px;padding:10px;background:#f8f9ff;border-radius:10px}

.play-btn.live{background:#ff8f00}

        description:`Loan amount transfers to your account simultaneously as ${a.name} is locked as collateral on the unified ledger. Both happen together or not at all.`,

  ];

// ── Language ─────────────────────────────────────────────
const LMAP = { EN:'en', HI:'hi', KN:'kn', TA:'ta' };
function lang() { return LMAP[S.config.primary_language] || 'hi'; }
function setTtsLang(l, el) {
  S.ttsLang = l;
  document.querySelectorAll('.lbtn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}

// ── Navigation ───────────────────────────────────────────
function setTopbar(title, badge, showBack, showDots) {
  document.getElementById('topbar-title').textContent = title;
  document.getElementById('topbar-right').textContent = badge || '';
  document.getElementById('back-btn').style.visibility = showBack ? 'visible' : 'hidden';
  document.getElementById('step-bar').style.display = showDots ? 'flex' : 'none';
}

function goBack() {
  if (S.screen === 'tx_detail') showDashboard();
  else if (S.screen === 'step') { S.step > 0 ? showStep(S.step - 1) : showDashboard(); }
  else showDashboard();
}

function showDashboard() {
  S.screen = 'dashboard';
  setTopbar('Finternet', '', false, false);
  renderDashboard();
}

function openTx(i) {
  S.screen = 'tx_detail';
  S.txIndex = i;
  S.txView = 'user';
  const tx = persona().txs[i];
  setTopbar(tx.title, tx.status === 'SUCCESS' ? '✅' : '❌', true, false);
  renderTxDetail();
}

function switchView(v) { S.txView = v; renderTxDetail(); }

function showStep(n) {
  S.screen = 'step';
  S.step = n;
  const st = steps()[n];
  setTopbar(st.title, `${n+1}/5`, true, true);
  for (let i = 0; i < 5; i++) {
    document.getElementById('sd'+i).className = 'sdot' + (i < n ? ' done' : i === n ? ' active' : '');
  }
  renderStep(n);
}

function showComplete() {
  S.screen = 'complete';
  setTopbar('Completed!', '🎉', false, false);
  renderComplete();
}

// ── Render: Step ─────────────────────────────────────────
async function renderStep(n) {
  const st = steps()[n];
  const content = document.getElementById('content');

  if (S.stepCache[n]) { renderStepContent(n, S.stepCache[n]); return; }

  content.innerHTML = `
    <div class="card c-tx">
      <div class="sk" style="height:12px;width:40%;margin-bottom:10px"></div>
      <div class="sk" style="height:18px;width:75%;margin-bottom:10px"></div>
      <div class="sk" style="height:13px;width:100%;margin-bottom:5px"></div>
      <div class="sk" style="height:13px;width:85%;margin-bottom:5px"></div>
      <div class="sk" style="height:13px;width:65%"></div>
    </div>
    <div style="text-align:center;color:#999;font-size:12px;margin-top:12px">✨ DPIx samajh raha hai...</div>`;

  const ngrok = S.config.ngrok_url;
  if (!ngrok) {
    content.innerHTML = `
      <div class="risk-box"><div>⚠️</div><div class="risk-text">ngrok URL set nahi hai. Configurator mein URL daalo aur "Save URL" dabao.</div></div>
      <div class="card c-tx"><div class="card-headline">${st.title}</div><div class="card-body">${st.obj.description}</div></div>
      <button class="btn btn-primary" onclick="renderStep(${n})">Refresh</button>`;
    return;
  }

  try {
   const r = await fetch(ngrok + '/api/rhetorical', {
        method:'POST', headers:{'Content-Type':'application/json','ngrok-skip-browser-warning':'true'},
      body: JSON.stringify({ step: st.obj, context: { language: lang(), userProfile: persona().profile, materiality: st.mat, appName: 'Finternet Asset Tokenization — DPIx Demo' } })
    });
    if (!r.ok) throw new Error('Server ' + r.status);
    const data = await r.json();
    S.stepCache[n] = data;
    renderStepContent(n, data);
  } catch (e) {
    content.innerHTML = `
      <div class="risk-box"><div>❌</div><div class="risk-text">Claude se error: ${e.message}</div></div>
      <div class="card c-tx"><div class="card-headline">${st.title}</div><div class="card-body">${st.obj.description}</div></div>
      <button class="btn btn-primary" onclick="renderStep(${n})">Dobara Try Karo</button>`;
  }
}

  const st = steps()[n];
  const bc = { INFORMATIONAL:'c-info', NAVIGATIONAL:'c-nav', TRANSACTIONAL:'c-tx', CONSEQUENTIAL:'c-con' }[st.mat];
  const isKLH = st.id === 'klh';

  setKLH(d.kya_likha_hai_script || st.obj.description);

  let extra = '';

    const t = st.obj.terms;

    extra = `<div class="contract-block">
<span>SMART_CONTRACT_ID:</span> ${cid}...<br>
<span>CONDITION:</span> ${t.condition}<br>
<span>TRIGGER:</span> ${t.trigger}<br>
<span>ACTION:</span> ${t.action}<br>
<span>PENALTY_APR:</span> ${t.penalty}
</div>`;
  }

  document.getElementById('content').innerHTML = `
    <div class="card ${bc}">
      <div class="card-step-tag">${st.icon} Step ${n+1} · ${st.mat}</div>
      <div class="card-headline">${d.headline}</div>
      <div class="card-body">${d.plain_explanation}</div>
    </div>
    ${extra}
    ${d.risk_signal ? `<div class="risk-box"><div>⚠️</div><div class="risk-text">${d.risk_signal}</div></div>` : ''}
    ${d.what_happens_next ? `<div class="next-box"><div class="next-label">Aage Kya Hoga</div><div class="next-text">${d.what_happens_next}</div></div>` : ''}
    ${d.help_nudge ? `<div class="nudge-box"><div>💡</div><div class="nudge-text">${d.help_nudge}</div></div>` : ''}
    ${isKLH ? `<button class="btn btn-warn" onclick="toggleSheet(); playKLH()">🔊 Kya Likha Hai — Abhi Suniye</button>` : ''}
    <button class="btn ${isLast?'btn-success':'btn-primary'}" onclick="${isLast?'showComplete()':'showStep('+(n+1)+')'}">
      ${isLast ? '✅ ' + (d.confidence_phrase||'Transaction Poori Karo') : '→ Aage Badhein'}
    </button>
    <div style="height:6px"></div>`;
}

// ── KLH / TTS ────────────────────────────────────────────
function setKLH(text) {
  S.klhScript = text;
  document.getElementById('klh-txt').textContent = text;
}

function toggleSheet() {
  const sheet = document.getElementById('bsheet');
  const fab = document.getElementById('fab');
  const isOpen = sheet.classList.contains('open');
  if (isOpen) {
    sheet.classList.remove('open');
    fab.style.display = 'flex';
  } else {
    sheet.classList.add('open');
    fab.style.display = 'none';
  }
}

function closeSheet() {
  document.getElementById('bsheet').classList.remove('open');
  document.getElementById('fab').style.display = 'flex';
}

function chunkText(text, max = 200) {
  const parts = text.match(/[^।\.!\?]+[।\.!\?]*/g) || [text];
  const out = [];
  let cur = '';
  for (const s of parts) {
    if (cur.length + s.length > max && cur) { out.push(cur.trim()); cur = s; }
    else cur += ' ' + s;
  }
  if (cur.trim()) out.push(cur.trim());
  return out.filter(c => c.length > 0);
}

let _actx = null;
function getActx() {
  if (!_actx) _actx = new (window.AudioContext || window.webkitAudioContext)();
  return _actx;
}

async function playBase64(dataUri) {
  const ctx = getActx();
  await ctx.resume();
  const b64 = dataUri.split(',')[1];
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  const buf = await ctx.decodeAudioData(bytes.buffer);
  return new Promise((res, rej) => {
    const src = ctx.createBufferSource();
    src.buffer = buf;
    src.connect(ctx.destination);
    src.onended = res;
    src.start(0);
  });
}

async function playKLH() {
  if (S.playing) return;
  const ngrok = S.config.ngrok_url;
  if (!ngrok) { setKLH('⚠️ ngrok URL set nahi hai. Configurator mein daalo.'); return; }

  // Unlock AudioContext on user gesture — must happen before any await
  getActx().resume();

  S.playing = true;
  document.getElementById('fab').classList.add('live');
  document.getElementById('play-btn').classList.add('live');
  document.getElementById('play-btn').disabled = true;

  const chunks = chunkText(S.klhScript);
  try {
    for (let i = 0; i < chunks.length; i++) {
      document.getElementById('play-lbl').textContent = `${i+1}/${chunks.length} bol raha hai...`;
     const r = await fetch(ngrok + '/api/kya-likha-hai', {
        method:'POST', headers:{'Content-Type':'application/json','ngrok-skip-browser-warning':'true'},
        body: JSON.stringify({ text: chunks[i], language: S.ttsLang })
      });
      if (!r.ok) throw new Error('TTS ' + r.status);
      const data = await r.json();
      if (data.data_uri) await playBase64(data.data_uri);
    }
  } catch(e) {
    document.getElementById('klh-txt').textContent += ' [Error: ' + e.message + ']';
  } finally {
    S.playing = false;
    document.getElementById('fab').classList.remove('live');
    document.getElementById('play-btn').classList.remove('live');
    document.getElementById('play-btn').disabled = false;
    document.getElementById('play-lbl').textContent = 'Suniye / Listen';
  }
}

// ── Config ───────────────────────────────────────────────
function applyConfig(cfg) {
  const prevPersona = S.config.persona_name;
  S.config = { ...S.config, ...cfg };
  S.ttsLang = LMAP[cfg.primary_language] || 'hi';

  document.querySelectorAll('.lbtn').forEach(b => b.classList.toggle('active', b.dataset.l === S.ttsLang));
  document.getElementById('cfg-badge').textContent = `⚙ ${cfg.persona_name||'DEFAULT'} · ${cfg.primary_language||'HI'} · ${cfg.ngrok_url?'🔗':'⚠️ no ngrok'}`;
  document.getElementById('cfg-strip-text').textContent = `${cfg.persona_name||'DEMO'} · ${cfg.primary_language||'HI'} · ${cfg.ngrok_url?'API OK':'no ngrok'}`;

  if (prevPersona !== cfg.persona_name) {
    S.stepCache = {};
    if (S.screen === 'step' || S.screen === 'complete') showDashboard();
    else if (S.screen === 'dashboard') renderDashboard();
    else if (S.screen === 'tx_detail') renderTxDetail();
  }
}

// ── Init ─────────────────────────────────────────────────
async function init() {
  try {
    const { data, error } = await db.from('configurations').select('*').eq('id','active').single();
    if (error) throw error;
    if (data) applyConfig(data);
    document.getElementById('cfg-dot').classList.add('on');
    document.getElementById('cfg-strip-text').textContent = (data?.persona_name||'DEMO') + ' · connected';

    db.channel('finternet')
      .on('postgres_changes', { event:'UPDATE', schema:'public', table:'configurations' },
        p => { applyConfig(p.new); })
      .subscribe();
  } catch(e) {
    document.getElementById('cfg-dot').style.background = '#ef4444';
    document.getElementById('cfg-strip-text').textContent = 'Config error: ' + e.message;
  }
  showDashboard();
}

init();
